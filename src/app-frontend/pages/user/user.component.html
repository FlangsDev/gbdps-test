<div class="master-container" *ngIf="!isFormOpen">
  <div class="page-header">
    <div>
      <h2>Users Management</h2>
      <p>Kelola data users</p>
    </div>
    <div class="header-actions">
      <!-- <button class="btn-secondary" (click)="exportData()">
        <i class="fa-solid fa-download"></i> Unduh Data
      </button> -->
      <button class="btn-primary" (click)="openAddForm()">
        <i class="fa-solid fa-plus"></i> Tambah User
      </button>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="filter-bar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Cari Username, Email, atau Role..." [(ngModel)]="searchKeyword">
    </div>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th width="50">No.</th>
          <th>Username</th>
          <th>Role</th>
          <th width="100" class="text-center">Email</th>
          <th width="110" class="text-center">Aksi</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredData; let i = index">
          <td class="text-center">{{i + 1}}</td>
          <td class="font-bold text-primary-val">{{item.username}}</td>
          <td>{{item.role}}</td>
          <td class="text-center">{{item.email}}</td>
          <td class="text-center actions-cell">
            <button class="btn-action edit" (click)="openEditForm(i)" title="Edit">
              <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button class="btn-action delete" (click)="deleteItem(i)" title="Hapus">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="filteredData.length === 0">
          <td colspan="5" class="text-center empty-row">
            <i class="fa-solid fa-box-open"></i>
            <p>Tidak ada data ditemukan</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

  <!-- FORM VIEW -->
<div class="form-card" *ngIf="isFormOpen">
  <div class="form-header">
    <div>
      <h2>{{ isEditing ? 'Edit Data User' : 'Tambah Data User' }}</h2>
      <p>{{ isEditing ? 'Ubah informasi data master user' : 'Isi informasi data master user baru' }}</p>
    </div>
  </div>

  <div class="master-form">
    <div class="form-row">
      <div class="form-group flex-1">
        <label>Username <span class="required">*</span></label>
        <input type="text" placeholder="Contoh: john.doe" [(ngModel)]="formData.username">
      </div>
      <div class="form-group flex-1">
        <label>Email <span class="required">*</span></label>
        <input type="email" placeholder="Contoh: john.doe@company.com" [(ngModel)]="formData.email">
      </div>
    </div>

    <div class="form-group">
      <label>Role <span class="required">*</span></label>
      <input type="text" placeholder="Contoh: Administrator, Supervisor, Staff" [(ngModel)]="formData.role">
    </div>
  </div>

  <div class="form-actions">
    <button class="btn-cancel" (click)="closeForm()">Batal</button>
    <button class="btn-submit" (click)="saveForm()">
      <i class="fa-solid fa-check"></i> {{ isEditing ? 'Update' : 'Simpan' }}
    </button>
  </div>
</div>
